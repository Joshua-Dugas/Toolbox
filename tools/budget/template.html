<h3>Family Budget</h3>

<form
hx-post="/tool/budget/add"
hx-target="#expense-list"
hx-swap="innerHTML">

<input
name="name"
placeholder="Expense name"
required>

<input
name="amount"
type="number"
step="0.01"
placeholder="Amount"
required>

<button>Add</button>

</form>

<hr>

<div id="expense-list">

<ul>
{% for e in expenses %}
<li>{{ e.name }} - ${{ e.amount }}</li>
{% endfor %}
</ul>

</div>
