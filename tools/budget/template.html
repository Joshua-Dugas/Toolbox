<h3>Family Budget</h3>

<form
hx-post="/tool/budget/add"
hx-target="#expense-table-body"
hx-swap="beforeend">

<input name="Expense Name" placeholder="Expense name" required>

<input name="Expense Amount" type="number" step="0.01" placeholder="Amount" required>

<button>Add</button>

</form>

<hr>

<table>
    <tr>
      <th>Expenses</th>
      <th>Amount</th>
    </tr>
    <tbody id="expense-table-body">

    {% for e in expenses %}
    <tr>
    <td>{{ e.name }}</td>
    <td>${{ e.amount }}</td>
    </tr>
    {% endfor %}

  </tbody>
</table>
